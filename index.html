<div id="root"><div class="loading" id="loading">Opening your board…</div></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
  :root{
    --paper:#f1f0ed;--paper-line:#e8e6e2;--ink:#23242b;--ink-soft:#7a7f8c;--ink-faint:#a7abb5;
    --card:#ffffff;--tile:#f1f2f4;--edge:#eae8e4;--accent:#5f7fa8;--accent-soft:#e7eef7;--accent-ink:#2f5f96;--banner:#002365;
    --notes:#686b77;
    --sans:'Poppins',ui-rounded,'SF Pro Rounded',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  #root{font-family:var(--sans);color:var(--ink);background:var(--paper);min-height:100vh;-webkit-font-smoothing:antialiased}
  .loading{color:var(--ink-soft);padding:48px;font-size:14px}

  .head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:18px 26px;background:var(--banner);position:sticky;top:0;z-index:20}
  .head-left{display:flex;align-items:center;gap:14px}
  .logo-badge{width:46px;height:46px;border-radius:50%;background:#fff;border:2px solid #6bb6ef;display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden}
  .logo-badge img{width:30px;height:30px;object-fit:contain}
  .title-wrap{display:flex;flex-direction:column;gap:4px}
  .eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#cfe0f2;font-weight:600}
  h1{font-size:23px;font-weight:700;letter-spacing:-.01em;margin:0;line-height:1;color:#fff;display:flex;align-items:center;gap:9px}
  .ziremark{height:22px;width:auto;display:block}
  .head-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}

  .filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:500;padding:6px 13px;border-radius:999px;cursor:pointer;border:1.5px solid transparent;background:rgba(255,255,255,.14);color:#fff;display:inline-flex;align-items:center;gap:6px;line-height:1;transition:all .12s ease}
  .chip:hover{background:rgba(255,255,255,.24)}
  .chip .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .chip.active{background:#fff;color:var(--ink);font-weight:600}
  .chip.all.active{background:#fff;color:var(--ink);border-color:#fff}

  .saved{font-size:11px;font-weight:500;color:rgba(255,255,255,.75);white-space:nowrap;min-width:70px;text-align:right}
  .saved.on{color:#dcebfb}

  .icon-btn{font-family:var(--sans);font-size:12.5px;font-weight:600;padding:7px 15px;border-radius:999px;cursor:pointer;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:#fff;transition:all .12s ease}
  .icon-btn:hover{background:#fff;color:var(--banner);border-color:#fff}

  .settings{padding:16px 26px;border-bottom:1px solid var(--paper-line);background:#fff;display:none;gap:20px;flex-wrap:wrap;align-items:center}
  .settings.open{display:flex}
  .settings label{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);display:block;margin-bottom:6px;font-weight:600}
  .brand-edit{display:flex;align-items:center;gap:7px}
  .brand-edit .dot{width:12px;height:12px;border-radius:50%;flex:none}
  .brand-edit input{font-family:var(--sans);font-size:13px;border:1.5px solid var(--edge);border-radius:9px;padding:7px 10px;width:130px;color:var(--ink);background:#fff}
  .brand-edit input:focus{outline:none;border-color:var(--accent)}

  .addsec-bar{padding:12px 26px;border-bottom:1px solid var(--paper-line);background:transparent;display:flex;align-items:center;gap:16px}
  .brand-logo-img{height:28px;width:auto;border-radius:6px;display:block}
  .brand-logo-text{font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
  .addsec{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink);background:var(--paper);border:none;border-radius:999px;height:28px;padding:0 14px;display:inline-flex;align-items:center;cursor:pointer}
  .addsec:hover{background:#e6e4df}

  .wrapz{padding:18px 26px 44px}
  .sec{border-radius:16px;overflow:hidden;margin-bottom:16px}
  .sec.sec-dragging{opacity:.5}
  .sec-h{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid #f0efec}
  .sec-grip{cursor:grab;color:var(--ink-faint);font-size:13px;line-height:1;user-select:none;flex:none;padding:0 1px}
  .sec-grip:active{cursor:grabbing}
  .sec-body{padding:14px 14px 16px}
  .sec-placeholder{height:3px;background:var(--accent);border-radius:2px;margin:4px 0}
  .sec-tick{width:4px;height:14px;border-radius:2px;flex:none}
  .sec-swatch{width:14px;height:14px;border-radius:50%;border:none;box-shadow:0 0 0 3px rgba(0,0,0,.05);cursor:pointer;flex:none;padding:0}
  .sec-title{font-size:14px;font-weight:700;border:none;background:transparent;font-family:var(--sans);padding:2px 0;min-width:120px;flex:0 1 auto}
  .sec-title:focus{outline:none;box-shadow:0 2px 0 currentColor}
  .sec-del{margin-left:auto;color:var(--ink-faint);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:6px;flex:none}
  .sec-del:hover{color:#c4562e;background:#f6e5df}

  .deptwrap{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;border-radius:8px}
  .deptwrap.wrap-drop{outline:2px dashed #bcd4ee;outline-offset:6px}
  .col{flex:0 0 300px;width:300px;display:flex;flex-direction:column}
  .col.dragging{opacity:.45}
  .col-head{display:flex;align-items:center;gap:8px;padding:2px 2px 12px;margin-bottom:6px;border-bottom:1.5px solid var(--paper-line)}
  .col-grip{cursor:grab;color:var(--ink-faint);font-size:13px;line-height:1;flex:none;padding:2px 1px;user-select:none}
  .col-grip:hover{color:var(--accent)}
  .col-grip:active{cursor:grabbing}
  .col-code{font-size:9px;letter-spacing:.02em;font-weight:700;color:#fff;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none;line-height:1}
  .col-name{font-size:14px;font-weight:500;letter-spacing:-.005em;border:none;background:transparent;color:var(--ink);width:100%;padding:2px 0;font-family:var(--sans)}
  .col-name:focus{outline:none;box-shadow:0 2px 0 var(--accent)}
  .col-name-static{font-size:15px;font-weight:600;color:var(--ink);width:100%;padding:2px 0}
  .col-count{font-size:12px;font-weight:600;color:var(--ink-faint);flex:none}
  .col-del{flex:none;cursor:pointer;color:var(--ink-faint);font-size:15px;line-height:1;padding:2px 5px;border-radius:6px}
  .col-del:hover{color:#c4562e;background:#f6e5df}

  .cards{display:flex;flex-direction:column;gap:11px;min-height:40px}
  .card{background:#fbfaf8;border:1px solid var(--edge);border-radius:14px;border-left:3px solid #9aa0a8;position:relative;padding:10px 12px 11px}
  .card.important{border-width:1.5px;border-left-width:3px}
  .card.card-dragging{opacity:.4}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .card-body{padding:0}
  .imp{margin-left:auto;color:#d09527;font-size:16px;font-weight:700;line-height:1;cursor:pointer;padding:0 1px;user-select:none}
  .imp ~ .card-del{margin-left:0}
  .card-grip{cursor:grab;font-size:12px;line-height:1;user-select:none;padding:2px 1px}
  .card-grip:active{cursor:grabbing}
  .brand-tag{font-size:10.5px;letter-spacing:.02em;font-weight:600;padding:4px 9px;border-radius:8px;line-height:1;font-family:var(--sans)}
  .status-pick{font-size:9.5px;letter-spacing:.02em;cursor:pointer;border-radius:999px;padding:3px 9px;font-weight:600;font-family:var(--sans);border:none}
  .card-del{margin-left:auto;cursor:pointer;font-size:16px;line-height:.6;padding:0 2px}
  .card-del:hover{color:#c4562e}

  .fview{width:100%;overflow-wrap:anywhere;white-space:pre-wrap;cursor:text}
  .ftitle{font-size:13.5px;font-weight:600;line-height:1.35;color:var(--ink);margin-bottom:4px}
  .fnotes{font-size:12.5px;line-height:1.5;color:var(--notes)}
  .fview.empty{color:var(--ink-faint);font-weight:500}
  .fedit{border:none;background:transparent;width:100%;resize:none;font-family:var(--sans);overflow:hidden;padding:0;outline:none;display:block}
  .fedit-title{font-size:13.5px;font-weight:600;line-height:1.35;color:var(--ink);margin-bottom:4px}
  .fedit-notes{font-size:12.5px;line-height:1.5;color:var(--notes)}
  .tlink{color:var(--accent);text-decoration:underline;text-underline-offset:2px;overflow-wrap:anywhere}
  .tlink:hover{color:var(--accent-ink)}
  .card-foot{font-size:10px;color:var(--ink-faint);margin-top:9px;padding-top:7px;border-top:1px solid #eceef1}
  .card-placeholder{height:2px;background:var(--accent);border-radius:2px;margin:1px 0}

  .add-card{margin-top:9px;font-size:12px;font-weight:500;color:var(--ink-soft);background:transparent;border:none;padding:5px 2px;cursor:pointer;text-align:left;width:100%;font-family:var(--sans);transition:all .12s ease}
  .add-card:hover{color:var(--accent)}
  .adddept{align-self:flex-start;flex:0 0 auto;width:auto;min-height:0;border:1px solid var(--edge);border-radius:999px;color:var(--ink-soft);font-size:12px;font-weight:500;padding:8px 15px;background:#fff;cursor:pointer;font-family:var(--sans);transition:all .12s ease}
  .adddept:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  .foot{padding:6px 26px 32px;font-size:12px;color:var(--ink-faint);display:flex;gap:16px;flex-wrap:wrap;align-items:center;justify-content:space-between}
  .foot-note{flex:1 1 auto;min-width:180px}
  .foot-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn-primary{font-family:var(--sans);font-size:13px;font-weight:600;padding:10px 18px;border-radius:12px;border:none;background:var(--ink);color:#fff;cursor:pointer;transition:all .12s ease}
  .btn-primary:hover{background:#33363b}
  .btn-outline{font-family:var(--sans);font-size:13px;font-weight:600;padding:10px 18px;border-radius:12px;border:1.5px solid var(--edge);background:#fff;color:var(--ink);cursor:pointer;transition:all .12s ease}
  .btn-outline:hover{border-color:var(--ink-soft)}
  .reset-link{color:var(--ink-faint);cursor:pointer;text-decoration:underline;text-underline-offset:2px;font-size:12px}
  .reset-link:hover{color:#c4562e}

  .pop{position:absolute;z-index:50;background:#fff;border:1px solid var(--edge);border-radius:12px;box-shadow:0 10px 28px rgba(31,33,36,.16);padding:6px;display:flex;flex-direction:column;gap:2px;min-width:140px}
  .pop button{font-family:var(--sans);font-size:12.5px;font-weight:500;text-align:left;background:transparent;border:none;padding:8px 10px;border-radius:9px;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:8px}
  .pop button:hover{background:var(--tile)}
  .pop .sw{width:10px;height:10px;border-radius:50%;flex:none}
  .pop-colors{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px;min-width:auto}
  .pop-colors .cw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px var(--edge);padding:0}
  .pop-colors .cw.sel{box-shadow:0 0 0 2px var(--ink)}

  @media (max-width:640px){.col,.adddept{flex-basis:100%;width:100%}h1{font-size:19px}.foot{justify-content:flex-start}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

  const DEFAULT_SEC='#002365';

  const DEFAULT_DEPTS=['Amazon','Admin','TikTok Shop','TikTok Ads','TikTok Organic','Shopify Store','Meta Ads','Content Marketing / Affiliates','Instagram Organic','Supply Chain','Product Development','Finance','CSAT and Retention','Email Marketing'];

  function uid(){return Math.random().toString(36).slice(2,9)}
  function mkCol(name){return {id:uid(),name,cards:[]}}
  function mkSection(title,color,cols){return {id:uid(),title:title||'Section',color:color||DEFAULT_SEC,cols:cols||[]}}
  function cleanCard(c){return {id:c.id||uid(),status:c.status||'none',title:c.title||'',notes:c.notes||'',updated:c.updated||new Date().toISOString()}}
  function cleanCol(c){return {id:c.id||uid(),name:c.name||'Untitled',cards:Array.isArray(c.cards)?c.cards.map(cleanCard):[]}}
  function normSection(s){return {id:s.id||uid(),title:s.title||'Section',color:s.color||DEFAULT_SEC,cols:Array.isArray(s.cols)?s.cols.map(cleanCol):[]}}
  function code(name){
    const w=String(name||'').trim().split(/\s+/).filter(x=>/[a-z0-9]/i.test(x));
    if(!w.length) return '—';
    if(w.length===1) return w[0].slice(0,3).toUpperCase();
    return w.map(x=>x[0]).join('').slice(0,3).toUpperCase();
  }
  function stamp(iso){
    if(!iso) return 'new';
    const d=new Date(iso);
    return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  }
  function textOn(hex){
    const c=String(hex||'').replace('#','');if(c.length<6)return '#fff';
    const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
    return ((0.299*r+0.587*g+0.114*b)/255)>0.6?'#1f2124':'#fff';
  }
  function tintOf(hex,a){const c=String(hex||'').replace('#','');if(c.length<6)return 'rgba(0,0,0,'+a+')';const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return 'rgba('+r+','+g+','+b+','+a+')';}
  function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
  function linkify(text){
    const re=/((https?:\/\/|www\.)[^\s]+)/gi;
    let out='',last=0,m;
    while((m=re.exec(text))){
      out+=esc(text.slice(last,m.index)).replace(/\n/g,'<br>');
      let url=m[0],tail='';
      const t=url.match(/[),.;:!?]+$/);
      if(t){tail=t[0];url=url.slice(0,url.length-tail.length);}
      const href=/^https?:\/\//i.test(url)?url:('https://'+url);
      out+=`<a href="${esc(href)}" target="_blank" rel="noopener noreferrer" class="tlink">${esc(url)}</a>`;
      if(tail) out+=esc(tail);
      last=m.index+m[0].length;
    }
    out+=esc(text.slice(last)).replace(/\n/g,'<br>');
    return out;
  }

  function mergeBrands(rawBrands){
    const byId=Object.fromEntries((rawBrands||[]).map(b=>[b.id,b]));
    return BRAND_DEFS.map(d=>({id:d.id,name:(byId[d.id]&&byId[d.id].name)||d.name,color:d.color}));
  }
  function seed(){
    const brands=BRAND_DEFS.map(d=>({...d}));
    const boards={};
    brands.forEach(b=>boards[b.id]=[mkSection('General',DEFAULT_SEC,DEFAULT_DEPTS.map(mkCol))]);
    return {brands,boards};
  }
  function migrateOldCols(raw){
    const brands=mergeBrands(raw.brands);
    const flat={};
    brands.forEach(b=>flat[b.id]=DEFAULT_DEPTS.map(mkCol));
    (raw.columns||[]).forEach(oldCol=>{
      brands.forEach(b=>{
        const cards=(oldCol.cards||[]).filter(c=>c.brandId===b.id).map(cleanCard);
        if(!cards.length) return;
        let target=flat[b.id].find(x=>x.name.toLowerCase()===String(oldCol.name||'').toLowerCase());
        if(!target){target=mkCol(oldCol.name||'Untitled');flat[b.id].push(target);}
        target.cards.push(...cards);
      });
    });
    const boards={};
    brands.forEach(b=>boards[b.id]=[mkSection('General',DEFAULT_SEC,flat[b.id])]);
    return {brands,boards};
  }
  function normalize(raw){
    if(raw && raw.boards && raw.brands){
      const brands=mergeBrands(raw.brands);
      const boards={};
      brands.forEach(b=>{
        const bd=raw.boards[b.id];
        if(Array.isArray(bd) && bd.length && bd[0] && Array.isArray(bd[0].cols)){
          boards[b.id]=bd.map(normSection);
        } else if(Array.isArray(bd)){
          boards[b.id]=[mkSection('General',DEFAULT_SEC,bd.map(cleanCol))];
        } else {
          boards[b.id]=[mkSection('General',DEFAULT_SEC,DEFAULT_DEPTS.map(mkCol))];
        }
      });
      return {brands,boards};
    }
    if(raw && Array.isArray(raw.columns)) return migrateOldCols(raw);
    return seed();
  }

  let state=null, filter=null, saver=null, dragId=null, cardDragId=null, secDragId=null;

  const store = (typeof window!=='undefined' && window.storage) ? window.storage : {
    async get(k){try{const v=window.localStorage.getItem(k);return v==null?null:{value:v};}catch(e){return null;}},
    async set(k,v){try{window.localStorage.setItem(k,v);}catch(e){}return {value:v};}
  };

  async function load(){
    let raw=null;
    try{const r=await store.get(KEY);raw=r&&r.value?JSON.parse(r.value):null;}catch(e){raw=null;}
    state=normalize(raw);
    if(!filter) filter=state.brands[0].id;
    render();
  }
  function save(){
    setSaved('Saving…',false);
    clearTimeout(saver);
    saver=setTimeout(async()=>{
      try{await store.set(KEY,JSON.stringify(state));setSaved('Saved',true);}
      catch(e){setSaved('Save failed',false);}
    },400);
  }
  function setSaved(t,on){const el=document.getElementById('saved');if(el){el.textContent=t;el.classList.toggle('on',!!on)}}

  const root=document.getElementById('root');
  const brandById=id=>state.brands.find(b=>b.id===id);

  function aggregate(){
    const present={};
    state.brands.forEach(b=>{
      (state.boards[b.id]||[]).forEach(sec=>{
        sec.cols.forEach(col=>{
          if(!present[col.name]) present[col.name]={name:col.name,cards:[]};
          col.cards.forEach(c=>present[col.name].cards.push(Object.assign({},c,{__brand:b.id})));
        });
      });
    });
    const names=Object.keys(present).sort((a,b)=>{
      const ia=DEFAULT_DEPTS.indexOf(a),ib=DEFAULT_DEPTS.indexOf(b);
      return (ia<0?999:ia)-(ib<0?999:ib) || a.localeCompare(b);
    });
    return names.map(n=>present[n]);
  }

  function render(){
    const sy=window.scrollY;
    const mode = filter==='all' ? 'all' : 'brand';
    const eyebrow = mode==='all' ? 'All brands · overview' : `${esc((brandById(filter)||{}).name||'')} · working board`;

    let body='';
    if(mode==='brand'){
      const board=state.boards[filter]||[];
      const bl=brandById(filter)||{};
      const logoEl=BRAND_LOGOS[filter]?`<img class="brand-logo-img" src="${BRAND_LOGOS[filter]}" alt="${esc(bl.name)}">`:`<span class="brand-logo-text">${esc(bl.name)}</span>`;
      body = `<div class="addsec-bar">${logoEl}<button class="addsec" id="addSec">+ Add section</button></div>
        <div class="wrapz">${board.map(sectionHtml).join('')}</div>`;
    }else{
      const cols=aggregate();
      body = `<div class="wrapz"><div class="deptwrap">${cols.map(c=>colHtml(c,'all')).join('')}</div></div>`;
    }

    root.innerHTML=`
      <div class="head">
        <div class="head-left">
          <div class="logo-badge"><img src="${ZBADGE}" alt="Ziresquare"></div>
          <div class="title-wrap">
            <span class="eyebrow">${eyebrow}</span>
            <h1><img class="ziremark" src="${ZMARK}" alt="Ziresquare"><span>Founder's Board</span></h1>
          </div>
        </div>
        <div class="head-right">
          <div class="filters">
            <span class="chip all ${filter==='all'?'active':''}" data-f="all">All</span>
            ${state.brands.map(b=>{
              const active=filter===b.id;
              const sv=active?`border-color:${b.color};box-shadow:0 0 0 1.5px ${b.color}`:'';
              return `<span class="chip ${active?'active':''}" data-f="${b.id}" style="${sv}"><span class="dot" style="background:${b.color}"></span>${esc(b.name)}</span>`;
            }).join('')}
          </div>
          <button class="icon-btn" id="toggleSettings">Brands</button>
          <span class="saved" id="saved">Saved</span>
        </div>
      </div>

      <div class="settings" id="settings">
        <div>
          <label>Rename your brands</label>
          <div style="display:flex;gap:16px;flex-wrap:wrap">
            ${state.brands.map(b=>`<span class="brand-edit"><span class="dot" style="background:${b.color}"></span><input data-brand="${b.id}" value="${esc(b.name)}"></span>`).join('')}
          </div>
        </div>
      </div>

      ${body}

      <div class="foot">
        <span class="foot-note">${mode==='all'?'Overview across all brands · switch to a brand to organize sections':'Auto-saves as you type · drag ⠿ to move · your private view'}</span>
        <div class="foot-actions">
          <button class="btn-outline" id="import">Import backup</button>
          <button class="btn-primary" id="export">Export backup</button>
          <a id="reset" class="reset-link">Reset board</a>
        </div>
        <input type="file" id="importFile" accept="application/json,.json" style="display:none">
      </div>
    `;
    wire(mode);
    window.scrollTo(0,sy);
  }

  function sectionHtml(sec){
    return `<div class="sec" data-sec="${sec.id}" draggable="false" style="background:#fff;border:1px solid var(--edge)">
      <div class="sec-h">
        <span class="sec-grip" title="Drag section">⠿</span>
        <button class="sec-swatch" data-secswatch="${sec.id}" style="background:${sec.color}" title="Change color"></button>
        <input class="sec-title" data-sectitle="${sec.id}" style="color:${sec.color}" value="${esc(sec.title)}">
        <span class="sec-del" data-secdel="${sec.id}" title="Remove section">×</span>
      </div>
      <div class="sec-body">
        <div class="deptwrap" data-secwrap="${sec.id}">
          ${sec.cols.map(c=>colHtml(c,'brand',sec.color)).join('')}
          <button class="adddept" data-adddept="${sec.id}">+ Add department</button>
        </div>
      </div>
    </div>`;
  }

  function colHtml(c,mode,accent){
    const cnt=c.cards.length;
    const ic=accent||'#9aa0a8';
    const head = mode==='brand'
      ? `<div class="col-head">
           <span class="col-grip" title="Drag department">⠿</span>
           <span class="col-code" style="background:${ic};color:#fff">${esc(code(c.name))}</span>
           <input class="col-name" data-colname="${c.id}" value="${esc(c.name)}">
           <span class="col-count">${cnt}</span>
           <span class="col-del" data-coldel="${c.id}" title="Remove department">×</span>
         </div>`
      : `<div class="col-head">
           <span class="col-code" style="background:${ic};color:#fff">${esc(code(c.name))}</span>
           <span class="col-name-static">${esc(c.name)}</span>
           <span class="col-count">${cnt}</span>
         </div>`;
    return `<div class="col" data-col="${c.id||''}" draggable="false">
      ${head}
      <div class="cards" data-cards="${c.id||''}">${c.cards.map(card=>cardHtml(card,mode)).join('')}</div>
      ${mode==='brand'?`<button class="add-card" data-addcard="${c.id}">+ Add item</button>`:''}
    </div>`;
  }

  function cardHtml(card,mode){
    const st=STATUSES[card.status]||STATUSES.none;
    let left;
    if(mode==='all'){
      const b=brandById(card.__brand)||{name:'',color:'#ccc'};
      left=`<span class="brand-tag" style="background:${b.color};color:${textOn(b.color)}">${esc(b.name)}</span>`;
    }else{
      left=`<span class="card-grip" title="Drag to move" style="color:${st.g}">⠿</span>`;
    }
    const titleHtml=card.title?linkify(card.title):PH_TITLE;
    const notesHtml=card.notes?linkify(card.notes):PH_NOTES;
    const imp=!!card.important;
    const impMark = imp && mode!=='all' ? `<span class="imp" data-imp="${card.id}" title="Important — click to unflag">!</span>` : '';
    const borderStyle = imp ? `border-color:${st.c}` : `border-left-color:${st.c}`;
    return `<div class="card${imp?' important':''}" data-card="${card.id}" draggable="false" style="${borderStyle}">
      <div class="card-top">
        ${left}
        <button class="status-pick" data-statuspick="${card.id}" style="color:${st.pt};background:${st.pb}">${st.label}</button>
        ${impMark}
        <span class="card-del" data-carddel="${card.id}" title="Delete" style="color:${st.g}">×</span>
      </div>
      <div class="card-body">
        <div class="fview ftitle ${card.title?'':'empty'}" data-view="title" data-card="${card.id}">${titleHtml}</div>
        <textarea class="fedit fedit-title" data-edit="title" data-card="${card.id}" rows="1" style="display:none">${esc(card.title)}</textarea>
        <div class="fview fnotes ${card.notes?'':'empty'}" data-view="notes" data-card="${card.id}">${notesHtml}</div>
        <textarea class="fedit fedit-notes" data-edit="notes" data-card="${card.id}" rows="1" style="display:none">${esc(card.notes)}</textarea>
        <div class="card-foot">updated ${esc(stamp(card.updated))}</div>
      </div>
    </div>`;
  }

  function findCard(id){
    for(const bId in state.boards){
      for(const sec of state.boards[bId]){
        for(const col of sec.cols){
          const f=col.cards.find(x=>x.id===id);
          if(f) return {brandId:bId,section:sec,col,card:f};
        }
      }
    }
    return null;
  }
  function findCol(id){
    for(const bId in state.boards){
      for(const sec of state.boards[bId]){
        const c=sec.cols.find(x=>x.id===id);
        if(c) return {brandId:bId,section:sec,col:c};
      }
    }
    return null;
  }

  function wire(mode){
    root.querySelectorAll('[data-f]').forEach(el=>el.onclick=()=>{filter=el.dataset.f;render()});
    document.getElementById('toggleSettings').onclick=()=>document.getElementById('settings').classList.toggle('open');
    root.querySelectorAll('[data-brand]').forEach(inp=>{
      inp.oninput=()=>{const b=brandById(inp.dataset.brand);if(b){b.name=inp.value;save();}};
      inp.onchange=()=>render();
    });

    document.getElementById('reset').onclick=()=>{if(confirm('Reset every brand board to the starting layout? This clears everything.')){state=seed();filter=state.brands[0].id;save();render();}};
    document.getElementById('export').onclick=()=>{
      try{
        const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download='founders-board-'+new Date().toISOString().slice(0,10)+'.json';
        document.body.appendChild(a);a.click();a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),1500);
      }catch(err){alert('Could not create the backup file. Try again.');}
    };
    document.getElementById('import').onclick=()=>document.getElementById('importFile').click();
    document.getElementById('importFile').onchange=e=>{
      const file=e.target.files&&e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=()=>{
        try{
          const data=JSON.parse(reader.result);
          const ok=data && ((data.boards&&data.brands)||Array.isArray(data.columns));
          if(!ok) throw new Error('shape');
          if(confirm('Import this backup? It will replace everything currently on your boards.')){
            state=normalize(data);filter=state.brands[0].id;save();render();
          }
        }catch(err){alert("That file couldn't be read as a Founder's Board backup. Make sure it's a .json file you exported from this board.");}
        finally{e.target.value='';}
      };
      reader.onerror=()=>{alert('Could not read that file.');e.target.value='';};
      reader.readAsText(file);
    };

    root.querySelectorAll('.fview').forEach(view=>{
      view.addEventListener('click',e=>{ if(e.target.closest('a')) return; startEdit(view); });
    });
    root.querySelectorAll('.fedit').forEach(t=>{
      t.addEventListener('input',()=>{t.style.height='auto';t.style.height=t.scrollHeight+'px';});
      t.addEventListener('blur',()=>commitEdit(t));
      t.addEventListener('keydown',ev=>{
        if(t.dataset.edit==='title'&&ev.key==='Enter'){ev.preventDefault();t.blur();}
        if(ev.key==='Escape'){ev.preventDefault();t.blur();}
      });
    });

    root.querySelectorAll('[data-statuspick]').forEach(btn=>btn.onclick=e=>openStatusPop(e,btn.dataset.statuspick));
    root.querySelectorAll('[data-carddel]').forEach(el=>el.onclick=()=>{
      const fc=findCard(el.dataset.carddel);if(!fc)return;
      fc.col.cards=fc.col.cards.filter(x=>x.id!==el.dataset.carddel);save();render();
    });
    root.querySelectorAll('[data-imp]').forEach(el=>el.onclick=e=>{
      e.stopPropagation();
      const fc=findCard(el.dataset.imp);if(!fc)return;
      fc.card.important=false;save();render();
    });

    if(mode==='brand'){
      root.querySelectorAll('.card').forEach(makeCardDraggable);
      root.querySelectorAll('.card').forEach(cardEl=>cardEl.addEventListener('dblclick',e=>{
        if(e.target.closest('.fview,.fedit,a,button,.card-del,.imp,.card-grip,.status-pick,.brand-tag')) return;
        const fc=findCard(cardEl.dataset.card);if(!fc)return;
        fc.card.important=!fc.card.important;save();render();
      }));
      root.querySelectorAll('.cards').forEach(cont=>{
        cont.addEventListener('dragover',e=>{ if(!cardDragId)return; e.preventDefault(); showCardPlaceholder(cont,e.clientY); });
        cont.addEventListener('drop',e=>{ if(!cardDragId)return; e.preventDefault(); dropCard(cont,e.clientY); });
      });
    }

    if(mode!=='brand') return;
    const board=state.boards[filter];

    document.getElementById('addSec').onclick=()=>{board.push(mkSection('New section',DEFAULT_SEC,[]));save();render();};
    root.querySelectorAll('[data-sectitle]').forEach(inp=>{
      inp.oninput=()=>{const s=board.find(x=>x.id===inp.dataset.sectitle);if(s){s.title=inp.value;save();}};
    });
    root.querySelectorAll('[data-secdel]').forEach(el=>el.onclick=()=>{
      const s=board.find(x=>x.id===el.dataset.secdel);if(!s)return;
      const deptCount=s.cols.length;
      if(deptCount && !confirm(`Remove section "${s.title}" and its ${deptCount} department(s)?`))return;
      state.boards[filter]=board.filter(x=>x.id!==el.dataset.secdel);save();render();
    });
    root.querySelectorAll('[data-secswatch]').forEach(btn=>btn.onclick=e=>openColorPop(e,btn.dataset.secswatch));
    root.querySelectorAll('[data-adddept]').forEach(el=>el.onclick=()=>{
      const s=board.find(x=>x.id===el.dataset.adddept);if(!s)return;
      s.cols.push(mkCol('New department'));save();render();
      const last=root.querySelector(`[data-secwrap="${s.id}"] .col:last-of-type .col-name`);
      if(last){last.focus();last.select&&last.select();}
    });

    root.querySelectorAll('[data-colname]').forEach(inp=>{
      inp.oninput=()=>{const fc=findCol(inp.dataset.colname);if(fc){fc.col.name=inp.value;inp.closest('.col-head').querySelector('.col-code').textContent=code(inp.value);save();}};
    });
    root.querySelectorAll('[data-coldel]').forEach(el=>el.onclick=()=>{
      const fc=findCol(el.dataset.coldel);if(!fc)return;
      if(fc.col.cards.length && !confirm(`Remove "${fc.col.name}" and its ${fc.col.cards.length} item(s)?`))return;
      fc.section.cols=fc.section.cols.filter(x=>x.id!==el.dataset.coldel);save();render();
    });
    root.querySelectorAll('[data-addcard]').forEach(el=>el.onclick=()=>{
      const fc=findCol(el.dataset.addcard);if(!fc)return;
      fc.col.cards.push({id:uid(),status:'none',title:'',notes:'',updated:new Date().toISOString()});
      save();render();
      const last=root.querySelector(`[data-cards="${fc.col.id}"] .card:last-of-type .fview[data-view="title"]`);
      if(last)startEdit(last);
    });

    // department drag (within + across sections)
    root.querySelectorAll('.col').forEach(colEl=>{
      const id=colEl.dataset.col;
      const grip=colEl.querySelector('.col-grip');
      if(grip){
        grip.addEventListener('mousedown',()=>colEl.setAttribute('draggable','true'));
        grip.addEventListener('mouseup',()=>colEl.setAttribute('draggable','false'));
      }
      colEl.addEventListener('dragstart',e=>{ if(e.target!==colEl)return; dragId=id;colEl.classList.add('dragging');e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',id)}catch(_){}} );
      colEl.addEventListener('dragend',()=>{colEl.classList.remove('dragging');colEl.setAttribute('draggable','false');dragId=null;root.querySelectorAll('.deptwrap').forEach(w=>w.classList.remove('wrap-drop'));});
    });
    root.querySelectorAll('.deptwrap').forEach(wrap=>{
      wrap.addEventListener('dragover',e=>{ if(!dragId)return; e.preventDefault(); wrap.classList.add('wrap-drop'); });
      wrap.addEventListener('dragleave',e=>{ if(e.target===wrap) wrap.classList.remove('wrap-drop'); });
      wrap.addEventListener('drop',e=>{ if(!dragId)return; e.preventDefault(); wrap.classList.remove('wrap-drop'); dropCol(wrap,e.clientX,e.clientY); });
    });

    // section drag (reorder whole sections)
    root.querySelectorAll('.sec').forEach(secEl=>{
      const grip=secEl.querySelector('.sec-grip');
      if(grip){
        grip.addEventListener('mousedown',()=>secEl.setAttribute('draggable','true'));
        grip.addEventListener('mouseup',()=>secEl.setAttribute('draggable','false'));
      }
      secEl.addEventListener('dragstart',e=>{ if(e.target!==secEl)return; secDragId=secEl.dataset.sec;secEl.classList.add('sec-dragging');e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',secDragId)}catch(_){}} );
      secEl.addEventListener('dragend',()=>{secEl.classList.remove('sec-dragging');secEl.setAttribute('draggable','false');secDragId=null;clearSecPlaceholders();});
    });
    const wrapz=root.querySelector('.wrapz');
    if(wrapz){
      wrapz.addEventListener('dragover',e=>{ if(!secDragId)return; e.preventDefault(); showSecPlaceholder(wrapz,e.clientY); });
      wrapz.addEventListener('drop',e=>{ if(!secDragId)return; e.preventDefault(); dropSection(wrapz,e.clientY); });
    }
  }

  // ---- department drag helpers ----
  function dropCol(wrap,x,y){
    const targetSecId=wrap.getAttribute('data-secwrap');
    const src=findCol(dragId);if(!src)return;
    const board=state.boards[filter];
    const targetSec=board.find(s=>s.id===targetSecId);if(!targetSec)return;
    src.section.cols=src.section.cols.filter(c=>c.id!==dragId);
    const els=[...wrap.querySelectorAll('.col')].filter(el=>el.dataset.col && el.dataset.col!==dragId);
    let refId=null,after=false,bd=Infinity;
    els.forEach(el=>{const r=el.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;const d=Math.hypot(x-cx,y-cy);if(d<bd){bd=d;refId=el.dataset.col;after=x>cx;}});
    let idx=targetSec.cols.length;
    if(refId){const ri=targetSec.cols.findIndex(c=>c.id===refId);if(ri>=0)idx=ri+(after?1:0);}
    targetSec.cols.splice(idx,0,src.col);
    save();render();
  }

  // ---- section drag helpers ----
  function clearSecPlaceholders(){root.querySelectorAll('.sec-placeholder').forEach(p=>p.remove());}
  function getSecAfter(wrapz,y){
    const els=[...wrapz.querySelectorAll('.sec:not(.sec-dragging)')];
    let closest={offset:-Infinity,el:null};
    for(const el of els){const box=el.getBoundingClientRect();const off=y-(box.top+box.height/2);if(off<0&&off>closest.offset)closest={offset:off,el};}
    return closest.el;
  }
  function showSecPlaceholder(wrapz,y){
    clearSecPlaceholders();
    const after=getSecAfter(wrapz,y);
    const ph=document.createElement('div');ph.className='sec-placeholder';
    if(after==null) wrapz.appendChild(ph); else wrapz.insertBefore(ph,after);
  }
  function dropSection(wrapz,y){
    const after=getSecAfter(wrapz,y);
    clearSecPlaceholders();
    const board=state.boards[filter];
    const from=board.findIndex(s=>s.id===secDragId);if(from<0)return;
    const moved=board.splice(from,1)[0];
    let idx=board.length;
    if(after){const ai=board.findIndex(s=>s.id===after.dataset.sec);if(ai>=0)idx=ai;}
    board.splice(idx,0,moved);
    save();render();
  }

  // ---- card drag helpers ----
  function makeCardDraggable(cardEl){
    const grip=cardEl.querySelector('.card-grip');
    if(!grip) return;
    grip.addEventListener('mousedown',()=>cardEl.setAttribute('draggable','true'));
    grip.addEventListener('mouseup',()=>cardEl.setAttribute('draggable','false'));
    cardEl.addEventListener('dragstart',e=>{
      e.stopPropagation();
      cardDragId=cardEl.dataset.card;
      cardEl.classList.add('card-dragging');
      e.dataTransfer.effectAllowed='move';
      try{e.dataTransfer.setData('text/plain',cardDragId)}catch(_){}
    });
    cardEl.addEventListener('dragend',()=>{cardEl.classList.remove('card-dragging');cardEl.setAttribute('draggable','false');cardDragId=null;clearPlaceholders();});
  }
  function clearPlaceholders(){root.querySelectorAll('.card-placeholder').forEach(p=>p.remove());}
  function getDragAfter(cont,yv){
    const els=[...cont.querySelectorAll('.card:not(.card-dragging)')];
    let closest={offset:-Infinity,el:null};
    for(const el of els){
      const box=el.getBoundingClientRect();
      const offset=yv-(box.top+box.height/2);
      if(offset<0 && offset>closest.offset) closest={offset,el};
    }
    return closest.el;
  }
  function showCardPlaceholder(cont,yv){
    clearPlaceholders();
    const after=getDragAfter(cont,yv);
    const ph=document.createElement('div');ph.className='card-placeholder';
    if(after==null) cont.appendChild(ph); else cont.insertBefore(ph,after);
  }
  function dropCard(cont,yv){
    const targetColId=cont.getAttribute('data-cards');
    const after=getDragAfter(cont,yv);
    clearPlaceholders();
    const src=findCard(cardDragId);if(!src)return;
    const tc=findCol(targetColId);if(!tc)return;
    src.col.cards=src.col.cards.filter(c=>c.id!==cardDragId);
    let idx=tc.col.cards.length;
    if(after){const ai=tc.col.cards.findIndex(c=>c.id===after.dataset.card);if(ai>=0)idx=ai;}
    tc.col.cards.splice(idx,0,src.card);
    src.card.updated=new Date().toISOString();
    save();render();
  }

  // ---- field edit ----
  function startEdit(view){
    const field=view.dataset.view;
    const cardEl=view.closest('.card');
    const ta=cardEl.querySelector(`.fedit[data-edit="${field}"]`);
    if(!ta) return;
    view.style.display='none';
    ta.style.display='block';
    ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';
    ta.focus({preventScroll:true});
    const v=ta.value;ta.value='';ta.value=v;
  }
  function commitEdit(ta){
    const id=ta.dataset.card, field=ta.dataset.edit;
    const cardEl=ta.closest('.card');
    const view=cardEl.querySelector(`.fview[data-view="${field}"]`);
    const f=findCard(id);
    if(f && f.card[field]!==ta.value){
      f.card[field]=ta.value;f.card.updated=new Date().toISOString();
      const foot=cardEl.querySelector('.card-foot');if(foot)foot.textContent='updated '+stamp(f.card.updated);
      save();
    }
    const val=ta.value;
    view.innerHTML = val ? linkify(val) : (field==='title'?PH_TITLE:PH_NOTES);
    view.classList.toggle('empty',!val);
    ta.style.display='none';
    view.style.display='';
  }

  function closePops(){document.querySelectorAll('.pop').forEach(p=>p.remove())}
  document.addEventListener('click',e=>{if(!e.target.closest('.pop')&&!e.target.closest('[data-statuspick]')&&!e.target.closest('[data-secswatch]'))closePops()});

  function openStatusPop(e,cardId){
    e.stopPropagation();closePops();
    const fc=findCard(cardId);if(!fc)return;
    const pop=document.createElement('div');pop.className='pop';
    pop.innerHTML=STATUS_ORDER.map(s=>`<button data-s="${s}"><span class="sw" style="background:${STATUSES[s].c}"></span>${STATUSES[s].label}</button>`).join('');
    place(pop,e.target);
    pop.querySelectorAll('[data-s]').forEach(bt=>bt.onclick=()=>{fc.card.status=bt.dataset.s;fc.card.updated=new Date().toISOString();closePops();save();render();});
  }
  function openColorPop(e,secId){
    e.stopPropagation();closePops();
    const board=state.boards[filter];
    const sec=board.find(s=>s.id===secId);if(!sec)return;
    const pop=document.createElement('div');pop.className='pop pop-colors';
    pop.innerHTML=SEC_COLORS.map(c=>`<button class="cw ${c.toLowerCase()===String(sec.color).toLowerCase()?'sel':''}" data-c="${c}" style="background:${c}" title="${c}"></button>`).join('');
    place(pop,e.target);
    pop.querySelectorAll('[data-c]').forEach(bt=>bt.onclick=()=>{sec.color=bt.dataset.c;closePops();save();render();});
  }
  function place(pop,anchor){
    document.body.appendChild(pop);
    const r=anchor.getBoundingClientRect();
    pop.style.top=(window.scrollY+r.bottom+4)+'px';
    pop.style.left=(window.scrollX+r.left)+'px';
    const pr=pop.getBoundingClientRect();
    if(pr.right>window.innerWidth-8) pop.style.left=(window.scrollX+window.innerWidth-pr.width-8)+'px';
  }

  load();
})();
</script>
